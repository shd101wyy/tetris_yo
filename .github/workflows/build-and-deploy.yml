name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Yo compiler
        run: npm install -g @shd101wyy/yo

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.64"

      - name: Build raylib for Emscripten
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git raylib-wasm-build
          cd raylib-wasm-build
          emcmake cmake -B build -G Ninja -DPLATFORM=Web -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=OFF
          emmake ninja -C build
          emmake ninja -C build install
          cd ..
          rm -rf raylib-wasm-build
          # emcc installs to sysroot/lib/ but searches sysroot/lib/wasm32-emscripten/
          SYSROOT=$(em-config CACHE)/sysroot
          cp "$SYSROOT/lib/libraylib.a" "$SYSROOT/lib/wasm32-emscripten/libraylib.a" 2>/dev/null || true

      - name: Fetch dependencies
        run: yo fetch

      - name: Build WASM target
        run: yo build install_wasm

      - name: Prepare Pages artifact
        run: cp yo-out/wasm32-emscripten/bin/tetris_yo_wasm.html yo-out/wasm32-emscripten/bin/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: yo-out/wasm32-emscripten/bin

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
